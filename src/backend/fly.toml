# fly.toml - Fly.io 配置
# 由 fly launch 自动生成，可手动修改

app = "sanguo-monopoly"
primary_region = "nrt"  # 东京节点，中国访问快

[build]
  context = "."
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "tcp"
  internal_port = 3001
  
  [[services.ports]]
    port = 80
    
  [[services.ports]]
    port = 443
    
  [[services.ports]]
    handlers = ["tls", "http"]
    port = "443"

# WebSocket 支持
[[services.ports]]
  handlers = ["http"]
  port = "80"
